model: deepseek/deepseek-v4-pro
label:
  zh_Hans: Deepseek V4 Pro
  en_US: Deepseek V4 Pro
model_type: llm
features:
  - stream-tool-call
  - multi-tool-call
  - structured-output
  - tool-call
model_properties:
  mode: chat
  context_size: 1048576
parameter_rules:
  - name: temperature
    use_template: temperature
    min: 0
    max: 2
    default: 1
  - name: top_p
    use_template: top_p
    min: 0
    max: 1
    default: 1
  - name: max_tokens
    use_template: max_tokens
    min: 1
    max: 2048
    default: 512
  - name: frequency_penalty
    use_template: frequency_penalty
    min: -2
    max: 2
    default: 0
  - name: presence_penalty
    use_template: presence_penalty
    min: -2
    max: 2
    default: 0
pricing:
  input: '0.0174'
  output: '0.0348'
  unit: '0.0001'
  currency: CNY
